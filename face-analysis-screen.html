<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>영상으로 분석 — 안다미로</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      background: #0a0a0a;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif;
      color: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── 헤더 ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 58px 16px 10px;
      flex-shrink: 0;
    }

    .rec-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 24px;
    }

    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    .rec-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #ffffff;
    }

    .face-count {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.70);
      letter-spacing: -0.2px;
    }

    /* ── 카메라 영역 ──────────────────────────────────────────── */
    .camera-wrap {
      position: relative;
      flex: 1;
      margin: 0 16px;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1d;
    }

    /* 단색 카메라 배경 */
    .camera-bg {
      position: absolute;
      inset: 0;
      background: #1e1f24;
    }

    /* 얼굴 바운딩 박스 */
    .face-box {
      position: absolute;
      top: 88px;
      left: 88px;
      width: 200px;
      height: 218px;
    }

    /* 반투명 전체 테두리 */
    .face-box-rect {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(75, 130, 245, 0.28);
      border-radius: 2px;
    }

    /* 코너 브래킷 SVG */
    .face-box svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── 표정 분석 바 오버레이 ───────────────────────────────── */
    .expr-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 16px 18px;
      border-radius: 0 0 20px 20px;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.88) 0%,
        rgba(0, 0, 0, 0.60) 65%,
        transparent 100%
      );
    }

    .expr-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      color: rgba(255, 255, 255, 0.42);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .expr-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .expr-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .expr-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
      width: 40px;
      flex-shrink: 0;
      letter-spacing: -0.2px;
    }

    .expr-track {
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      overflow: hidden;
    }

    .expr-fill {
      height: 100%;
      border-radius: 999px;
    }

    .expr-pct {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.62);
      width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.1px;
    }

    /* ── 상태 라인 ────────────────────────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 0;
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.48);
      letter-spacing: -0.2px;
    }

    /* ── 버튼 영역 ────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      padding: 0 16px 30px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      height: 52px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel {
      background: rgba(239, 68, 68, 0.13);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.25);
      font-weight: 600;
    }

    .btn-complete {
      background: #4B82F5;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <!-- ── 헤더 ── -->
  <div class="header">
    <div class="rec-badge">
      <div class="rec-dot"></div>
      <span class="rec-text">REC 00:28</span>
    </div>
    <span class="face-count">얼굴 1명 감지</span>
  </div>

  <!-- ── 카메라 영역 ── -->
  <div class="camera-wrap">

    <!-- 단색 배경 (카메라 피드 대체) -->
    <div class="camera-bg"></div>

    <!-- 얼굴 바운딩 박스 -->
    <div class="face-box">
      <!-- 반투명 전체 테두리 -->
      <div class="face-box-rect"></div>
      <!-- 코너 브래킷 -->
      <svg viewBox="0 0 200 218" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 좌상단 -->
        <path d="M1 24 L1 1 L24 1" stroke="#4B82F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 우상단 -->
        <path d="M176 1 L199 1 L199 24" stroke="#4B82F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 좌하단 -->
        <path d="M1 194 L1 217 L24 217" stroke="#4B82F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 우하단 -->
        <path d="M176 217 L199 217 L199 194" stroke="#4B82F5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- 표정 분석 바 -->
    <div class="expr-overlay">
      <div class="expr-title">실시간 표정 분석</div>
      <div class="expr-rows">

        <div class="expr-row">
          <span class="expr-label">행복</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 76%; background: #22c55e;"></div>
          </div>
          <span class="expr-pct">76%</span>
        </div>

        <div class="expr-row">
          <span class="expr-label">무표정</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 4%; background: #9ca3af;"></div>
          </div>
          <span class="expr-pct">4%</span>
        </div>

        <div class="expr-row">
          <span class="expr-label">슬픔</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 16%; background: #4B82F5;"></div>
          </div>
          <span class="expr-pct">16%</span>
        </div>

        <div class="expr-row">
          <span class="expr-label">놀람</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 2%; background: #f59e0b;"></div>
          </div>
          <span class="expr-pct">0%</span>
        </div>

        <div class="expr-row">
          <span class="expr-label">불안</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 1%; background: #a78bfa;"></div>
          </div>
          <span class="expr-pct">0%</span>
        </div>

        <div class="expr-row">
          <span class="expr-label">화남</span>
          <div class="expr-track">
            <div class="expr-fill" style="width: 1%; background: #ef4444;"></div>
          </div>
          <span class="expr-pct">0%</span>
        </div>

      </div>
    </div>
  </div>

  <!-- ── 상태 라인 ── -->
  <div class="status">
    <div class="status-dot"></div>
    <span class="status-text">얼굴 감지됨 · 표정 분석 중</span>
  </div>

  <!-- ── 버튼 ── -->
  <div class="btn-row">
    <button class="btn btn-cancel">취소</button>
    <button class="btn btn-complete">분석 완료 →</button>
  </div>

</body>
</html>
