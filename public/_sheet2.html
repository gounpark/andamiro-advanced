<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미래 날짜 표시 방식 비교</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: flex-start; gap: 24px; padding: 32px 24px; flex-wrap: wrap; }

  .phone { width: 390px; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }

  .label { text-align: center; padding: 16px; font-size: 13px; font-weight: 600; color: #555; background: #fafafa; border-bottom: 1px solid #eee; }
  .label span { display: block; font-size: 11px; font-weight: 400; color: #888; margin-top: 2px; }

  /* 헤더 */
  .header { background: linear-gradient(160deg, #5b8def 0%, #7eb3f7 100%); padding: 20px 24px 32px; position: relative; overflow: hidden; }
  .header-title { color: #f0f4ff; font-size: 17px; font-weight: 400; }
  .header-sub { color: white; font-size: 21px; font-weight: 700; margin-top: 4px; }
  .cta { background: white; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .cta span { font-size: 14px; font-weight: 600; color: #5b8def; }
  .cta-arrow { width: 18px; height: 18px; color: #5b8def; }

  /* 캘린더 */
  .cal { background: white; border-radius: 20px 20px 0 0; margin-top: -12px; padding: 24px; position: relative; z-index: 1; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .cal-month { font-size: 20px; font-weight: 700; color: #111; }
  .week-labels { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 12px; }
  .week-labels span { font-size: 12px; color: #999; font-weight: 500; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px 0; }
  .day { display: flex; justify-content: center; align-items: center; height: 42px; }

  /* 클로버 셀 */
  .cell { position: relative; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .cell-num { font-size: 12px; font-weight: 600; position: relative; z-index: 1; }

  /* 클로버 SVG 배경 */
  .clover { position: absolute; inset: 0; }

  /* 상태별 색상 */
  .state-out { opacity: 0 }
  .state-today .cell-num { color: white; }
  .state-active .cell-num { color: white; }
  .state-empty .cell-num { color: #9395a1; }

  /* 미래 날짜 스타일 A: 숫자만 + 회색 (제안) */
  .future-a .cell-num { color: #d0d0d8; font-weight: 500; }
  .future-a .clover { display: none; }

  /* 미래 날짜 스타일 B: 클로버 dim (대안) */
  .future-b .clover { opacity: 0.25; }
  .future-b .cell-num { color: #bbb; }

  /* 미래 날짜 스타일 C: 현재(아무 처리 없음) */
  .future-c .cell-num { color: #9395a1; }

  /* 점 (선택됨) */
  .dot { width: 5px; height: 5px; background: #11a757; border-radius: 50%; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>

<!-- ① 현재 (변경 없음) -->
<div class="phone">
  <div class="label">현재 <span>미래도 과거와 동일하게 빈 클로버</span></div>
  <div class="header">
    <p class="header-title">오늘 하루는 어떠셨나요?</p>
    <p class="header-sub">지금 마음을 가볍게 남겨보세요!</p>
    <div class="cta">
      <span>오늘 기록 남기러 가기</span>
      <svg class="cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </div>
  <div class="cal">
    <div class="cal-header">
      <span class="cal-month">2026. 06</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="week-labels">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="days" id="cal-current"></div>
  </div>
</div>

<!-- ② 제안: 숫자만 + 회색 -->
<div class="phone">
  <div class="label">제안 A: 숫자만 + 옅은 회색 <span>클로버 없음, 미래임을 명확히 표현</span></div>
  <div class="header">
    <p class="header-title">오늘 하루는 어떠셨나요?</p>
    <p class="header-sub">지금 마음을 가볍게 남겨보세요!</p>
    <div class="cta">
      <span>오늘 기록 남기러 가기</span>
      <svg class="cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </div>
  <div class="cal">
    <div class="cal-header">
      <span class="cal-month">2026. 06</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="week-labels">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="days" id="cal-future-a"></div>
  </div>
</div>

<!-- ③ 대안: 클로버 dim -->
<div class="phone">
  <div class="label">대안 B: 클로버 희미하게 <span>클로버는 유지, opacity만 낮춤</span></div>
  <div class="header">
    <p class="header-title">오늘 하루는 어떠셨나요?</p>
    <p class="header-sub">지금 마음을 가볍게 남겨보세요!</p>
    <div class="cta">
      <span>오늘 기록 남기러 가기</span>
      <svg class="cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </div>
  <div class="cal">
    <div class="cal-header">
      <span class="cal-month">2026. 06</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="week-labels">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="days" id="cal-future-b"></div>
  </div>
</div>

<script>
// 클로버 SVG들
const cloverEmpty = `<svg viewBox="0 0 38 38" class="clover" aria-hidden="true"><path d="M19 4c-2.5 0-4.5 2-4.5 4.5 0 1 .3 1.9.8 2.6-.7-.5-1.6-.8-2.6-.8C10.2 10.3 8.2 12.3 8.2 14.8s2 4.5 4.5 4.5c1 0 1.9-.3 2.6-.8-.5.7-.8 1.6-.8 2.6 0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5c0-1-.3-1.9-.8-2.6.7.5 1.6.8 2.6.8 2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5c-1 0-1.9.3-2.6.8.5-.7.8-1.6.8-2.6C23.5 6 21.5 4 19 4z" fill="#dde8fa"/><rect x="17.5" y="22" width="3" height="10" rx="1.5" fill="#dde8fa" opacity="0.85"/></svg>`;

const cloverActive = `<svg viewBox="0 0 38 38" class="clover" aria-hidden="true"><path d="M19 4c-2.5 0-4.5 2-4.5 4.5 0 1 .3 1.9.8 2.6-.7-.5-1.6-.8-2.6-.8C10.2 10.3 8.2 12.3 8.2 14.8s2 4.5 4.5 4.5c1 0 1.9-.3 2.6-.8-.5.7-.8 1.6-.8 2.6 0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5c0-1-.3-1.9-.8-2.6.7.5 1.6.8 2.6.8 2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5c-1 0-1.9.3-2.6.8.5-.7.8-1.6.8-2.6C23.5 6 21.5 4 19 4z" fill="#5b8def"/><rect x="17.5" y="22" width="3" height="10" rx="1.5" fill="#5b8def" opacity="0.85"/></svg>`;

const cloverToday = `<svg viewBox="0 0 38 38" class="clover" aria-hidden="true"><path d="M19 4c-2.5 0-4.5 2-4.5 4.5 0 1 .3 1.9.8 2.6-.7-.5-1.6-.8-2.6-.8C10.2 10.3 8.2 12.3 8.2 14.8s2 4.5 4.5 4.5c1 0 1.9-.3 2.6-.8-.5.7-.8 1.6-.8 2.6 0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5c0-1-.3-1.9-.8-2.6.7.5 1.6.8 2.6.8 2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5c-1 0-1.9.3-2.6.8.5-.7.8-1.6.8-2.6C23.5 6 21.5 4 19 4z" fill="#11a757"/><rect x="17.5" y="22" width="3" height="10" rx="1.5" fill="#11a757" opacity="0.85"/></svg>`;

// 2026년 6월 캘린더 생성
// 6월 1일 = 월요일(1), 오늘 = 4일
const TODAY = 4;
const ACTIVE = new Set([1, 2, 3]); // 과거 기록 있는 날
const TOTAL_DAYS = 30;
const FIRST_DAY = 1; // 월요일

function buildCal(containerId, futureStyle) {
  const container = document.getElementById(containerId);

  // 앞 빈칸
  for (let i = 0; i < FIRST_DAY; i++) {
    const div = document.createElement('div');
    div.className = 'day';
    container.appendChild(div);
  }

  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day';

    const isFuture = d > TODAY;
    const isToday = d === TODAY;
    const isActive = ACTIVE.has(d);

    const cell = document.createElement('div');
    cell.className = 'cell';

    if (isToday) {
      cell.innerHTML = cloverToday;
      cell.classList.add('state-today');
    } else if (isActive) {
      cell.innerHTML = cloverActive;
      cell.classList.add('state-active');
    } else if (isFuture) {
      if (futureStyle === 'a') {
        // 클로버 없이 숫자만
        cell.classList.add('future-a');
      } else if (futureStyle === 'b') {
        // 희미한 클로버
        cell.innerHTML = cloverEmpty;
        cell.classList.add('future-b');
      } else {
        // 현재 (변경 없음)
        cell.innerHTML = cloverEmpty;
        cell.classList.add('state-empty');
      }
    } else {
      // 과거 empty
      cell.innerHTML = cloverEmpty;
      cell.classList.add('state-empty');
    }

    const num = document.createElement('span');
    num.className = 'cell-num';
    num.textContent = d;
    cell.appendChild(num);

    dayDiv.appendChild(cell);
    container.appendChild(dayDiv);
  }

  // 뒤 빈칸
  const total = FIRST_DAY + TOTAL_DAYS;
  const remainder = total % 7;
  if (remainder !== 0) {
    for (let i = 0; i < 7 - remainder; i++) {
      const div = document.createElement('div');
      div.className = 'day';
      container.appendChild(div);
    }
  }
}

buildCal('cal-current', 'current');
buildCal('cal-future-a', 'a');
buildCal('cal-future-b', 'b');
</script>
</body>
</html>
